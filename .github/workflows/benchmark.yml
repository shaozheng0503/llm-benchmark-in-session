name: benchmark

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  checks: write

jobs:
  # ===== 1) 硬断言评分（必跑，无外部依赖） =====
  grade:
    name: grade (hard assertions)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run benchmark
        run: make grade

      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-report
          path: |
            reports/cases/cases_results.md
            reports/cases/cases_results.json
            reports/cases/regression.md
          if-no-files-found: ignore

      - name: Check regression
        id: regression
        run: |
          if [ -f reports/cases/regression.md ]; then
            if grep -q "退步 [1-9]" reports/cases/regression.md; then
              echo "regression_detected=true" >> $GITHUB_OUTPUT
            else
              echo "regression_detected=false" >> $GITHUB_OUTPUT
            fi
          else
            echo "regression_detected=false" >> $GITHUB_OUTPUT
          fi

      - name: Comment on PR
        if: github.event_name == 'pull_request' && steps.regression.outputs.regression_detected == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('reports/cases/regression.md', 'utf8');
            const body = `## ⚠️ Benchmark regression detected\n\n\`\`\`\n${report}\n\`\`\``;
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });

  # ===== 2) LLM-as-judge（可选，需 secret） =====
  judge:
    name: llm-as-judge
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || env.LLM_API_BASE != '' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run LLM-as-judge
        env:
          LLM_API_BASE: ${{ secrets.LLM_API_BASE }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          JUDGE_MODEL: ${{ vars.JUDGE_MODEL || 'gpt-4o' }}
        run: make judge

      - uses: actions/upload-artifact@v4
        with:
          name: judge-report
          path: reports/judge/
          if-no-files-found: ignore

  # ===== 3) Lint =====
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ruff
      - run: ruff check scripts/

  # ===== 4) 全部无 API 脚本（汇总） =====
  summary:
    name: summary (no API)
    runs-on: ubuntu-latest
    needs: grade
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt

      - name: Run all offline analysis
        run: |
          make bench
          make calibration
          make difficulty
          make failure
          make radar || true

      - uses: actions/upload-artifact@v4
        with:
          name: summary-report
          path: |
            reports/summary/
            reports/radar.png
            reports/calibration/
            reports/difficulty/
            reports/failure_analysis/
          if-no-files-found: ignore
